<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUD | HYPER-ADMIN V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --black: #000000; --white: #FFFFFF; --accent: #FF5C00; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; }
        .h1 { font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; }
        .card { background: #111; border-radius: 24px; border: 1px solid #222; transition: all 0.3s; }
        .card:hover { border-color: #444; background: #161616; }
        .input-field { background: #1a1a1a; border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; }
        .input-field:focus { border-color: white; outline: none; background: #222; }
        .btn-primary { background: white; color: black; font-weight: 900; padding: 16px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .btn-primary:active { scale: 0.95; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; color: #888; font-weight: 700; font-size: 13px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .sidebar-link.active { background: white; color: black; }
        .toast { position: fixed; bottom: 40px; right: 40px; background: white; color: black; padding: 20px 40px; border-radius: 100px; font-weight: 900; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(100px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-72 border-r border-white/5 p-10 flex flex-col fixed h-full bg-black z-50">
        <div class="mb-20">
            <h1 class="h1 italic text-3xl">LOUD<span class="text-orange-500">.</span></h1>
            <p class="text-[9px] font-black uppercase tracking-[0.3em] opacity-30">Admin V2 Hyper-Drive</p>
        </div>

        <nav class="space-y-4 flex-1">
            <div onclick="setView('inventory')" id="nav-inventory" class="sidebar-link active">
                <span class="material-symbols-outlined">inventory</span> Inventory
            </div>
            <div onclick="setView('orders')" id="nav-orders" class="sidebar-link">
                <span class="material-symbols-outlined">notifications_active</span> Live Orders
            </div>
            <div onclick="setView('categories')" id="nav-categories" class="sidebar-link">
                <span class="material-symbols-outlined">category</span> Categories
            </div>
        </nav>

        <div class="pt-8 border-t border-white/5">
            <button onclick="location.href='index.html'" class="w-full bg-white/5 text-white/50 py-4 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black transition-all">Exit Dashboard</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="ml-72 flex-1 p-16">
        
        <header class="flex justify-between items-end mb-16">
            <div>
                <h2 id="viewTitle" class="h1 italic text-6xl">INVENTORY</h2>
                <p id="viewSub" class="text-white/30 font-bold uppercase tracking-widest text-[10px] mt-4">Complete command over your warehouse products</p>
            </div>
            <button onclick="openModal('add')" class="bg-white text-black w-16 h-16 rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-2xl">
                <span class="material-symbols-outlined font-black">add</span>
            </button>
        </header>

        <!-- SEARCH -->
        <div id="controls" class="mb-12">
            <div class="relative max-w-2xl">
                <span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-white/20">search</span>
                <input type="text" id="adminSearch" oninput="renderInventory()" placeholder="Search products, IDs, or categories..." class="w-full pl-16 pr-8 py-5 bg-white/5 rounded-2xl text-sm font-bold border border-white/5 focus:border-white/20 outline-none transition-all">
            </div>
        </div>

        <div id="contentArea" class="pb-32">
            <!-- Dynamic Content -->
        </div>

    </main>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast">Action Successful 🚀</div>

    <!-- GLOBAL MODAL -->
    <div id="globalModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden flex items-center justify-center z-[500] p-6">
        <div class="bg-[#0a0a0a] w-full max-w-2xl rounded-[40px] p-12 border border-white/10 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-10 right-10 w-12 h-12 bg-white/5 rounded-full flex items-center justify-center hover:bg-white/10">
                <span class="material-symbols-outlined">close</span>
            </button>
            
            <h3 id="modalTitle" class="h1 italic text-4xl mb-12">Add Product</h3>
            
            <div id="modalContent" class="grid grid-cols-2 gap-6 max-h-[60vh] overflow-y-auto no-scrollbar pr-4">
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Product Name</label>
                    <input type="text" id="m-name" class="input-field" placeholder="e.g. Fresh Milk">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Base Price (₹)</label>
                    <input type="number" id="m-price" class="input-field" placeholder="100">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Discount Price (₹)</label>
                    <input type="number" id="m-discount" class="input-field" placeholder="89">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Stock Level</label>
                    <input type="number" id="m-stock" class="input-field" placeholder="25">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Weight (grams)</label>
                    <input type="number" id="m-weight" class="input-field" placeholder="500">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Category</label>
                    <select id="m-category" class="input-field">
                        <option value="Dairy">Dairy</option>
                        <option value="Pantry">Pantry</option>
                        <option value="Produce">Produce</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Snacks">Snacks</option>
                        <option value="Household">Household</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Image URL</label>
                    <input type="text" id="m-img" class="input-field" placeholder="https://cdn...">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Description</label>
                    <textarea id="m-desc" class="input-field h-24 resize-none" placeholder="Product details..."></textarea>
                </div>
            </div>

            <div class="mt-12 flex gap-4">
                <button id="modalActionBtn" onclick="submitProduct()" class="flex-1 btn-primary">Create Product</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://asvelariyhlcrnujtqsq.supabase.co";
        const SB_KEY = "sb_publishable_T6-Wlk2PumuS8_xzBRI3ng_KWouOIDi";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let DATA = [];
        let ORDERS = [];
        let currentView = 'inventory';
        let editingId = null;

        async function fetchData() {
            const { data: p, error: pe } = await _supabase.from('products').select('*').order('id');
            const { data: o, error: oe } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (pe || oe) showToast("Cloud Sync Error 🔴");
            DATA = p || [];
            ORDERS = o || [];
            render();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function setView(v) {
            currentView = v;
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
            document.getElementById('viewTitle').innerText = v.toUpperCase();
            render();
        }

        function render() {
            const area = document.getElementById('contentArea');
            if (currentView === 'inventory') renderInventory(area);
            else if (currentView === 'orders') renderOrders(area);
            else if (currentView === 'categories') renderCategories(area);
        }

        function renderInventory(el) {
            const q = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = DATA.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
            
            el.innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                    ${filtered.map(p => `
                        <div class="card p-8 flex gap-8 items-center">
                            <img src="${p.image_url}" class="w-20 h-20 object-contain rounded-xl bg-white/5 p-2"/>
                            <div class="flex-1">
                                <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-1">#${p.id} • ${p.category}</p>
                                <h4 class="h1 italic !text-xl mb-3">${p.name}</h4>
                                <div class="flex gap-6 items-center">
                                    <span class="text-xs font-bold text-white/50">₹${p.discount_price}</span>
                                    <span class="text-[10px] px-3 py-1 rounded-full ${p.stock < 10 ? 'bg-orange-500/10 text-orange-500' : 'bg-green-500/10 text-green-500'} font-black uppercase">Stock: ${p.stock}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openModal('edit', ${p.id})" class="w-12 h-12 bg-white/5 hover:bg-white hover:text-black rounded-xl flex items-center justify-center transition-all">
                                    <span class="material-symbols-outlined text-sm">edit</span>
                                </button>
                                <button onclick="deleteProduct(${p.id})" class="w-12 h-12 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white rounded-xl flex items-center justify-center transition-all">
                                    <span class="material-symbols-outlined text-sm">delete</span>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOrders(el) {
            el.innerHTML = `
                <div class="space-y-6">
                    ${ORDERS.map(o => `
                        <div class="card p-10 flex justify-between items-center">
                            <div class="flex gap-8 items-center">
                                <div class="w-16 h-16 bg-white/5 text-white rounded-full flex items-center justify-center h3 italic">#</div>
                                <div>
                                    <h4 class="h1 italic !text-2xl mb-1">${o.customer_name}</h4>
                                    <p class="text-[10px] font-black text-white/30 uppercase tracking-widest">${o.customer_phone}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="h1 italic !text-3xl mb-1">₹${o.total_amount}</p>
                                <span class="px-4 py-1.5 rounded-full bg-orange-500 text-black text-[9px] font-black uppercase">${o.status}</span>
                            </div>
                        </div>
                    `).join('') || '<p class="py-20 text-center opacity-20 h1">No Orders Recorded</p>'}
                </div>
            `;
        }

        function openModal(mode, id = null) {
            editingId = id;
            const title = document.getElementById('modalTitle');
            const btn = document.getElementById('modalActionBtn');
            
            if (mode === 'add') {
                title.innerText = "Add New Product";
                btn.innerText = "Create Product";
                clearFields();
            } else {
                const p = DATA.find(x => x.id === id);
                title.innerText = "Edit Product";
                btn.innerText = "Save Changes";
                fillFields(p);
            }
            document.getElementById('globalModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('globalModal').classList.add('hidden'); }

        function clearFields() {
            document.getElementById('m-name').value = "";
            document.getElementById('m-price').value = "";
            document.getElementById('m-discount').value = "";
            document.getElementById('m-stock').value = "";
            document.getElementById('m-weight').value = "";
            document.getElementById('m-img').value = "";
            document.getElementById('m-desc').value = "";
        }

        function fillFields(p) {
            document.getElementById('m-name').value = p.name;
            document.getElementById('m-price').value = p.price;
            document.getElementById('m-discount').value = p.discount_price;
            document.getElementById('m-stock').value = p.stock;
            document.getElementById('m-weight').value = p.weight;
            document.getElementById('m-category').value = p.category;
            document.getElementById('m-img').value = p.image_url;
            document.getElementById('m-desc').value = p.description;
        }

        async function submitProduct() {
            const pData = {
                name: document.getElementById('m-name').value,
                price: parseInt(document.getElementById('m-price').value),
                discount_price: parseInt(document.getElementById('m-discount').value),
                stock: parseInt(document.getElementById('m-stock').value),
                weight: parseInt(document.getElementById('m-weight').value),
                category: document.getElementById('m-category').value,
                image_url: document.getElementById('m-img').value,
                description: document.getElementById('m-desc').value
            };

            if (editingId) {
                const { error } = await _supabase.from('products').update(pData).eq('id', editingId);
                if (error) showToast("Update Failed 🔴");
                else { showToast("Product Updated 🚀"); closeModal(); fetchData(); }
            } else {
                const { error } = await _supabase.from('products').insert([pData]);
                if (error) showToast("Create Failed 🔴");
                else { showToast("Product Created 🚀"); closeModal(); fetchData(); }
            }
        }

        async function deleteProduct(id) {
            if (!confirm("Are you sure? This will remove the product permanently.")) return;
            const { error } = await _supabase.from('products').delete().eq('id', id);
            if (error) showToast("Delete Failed 🔴");
            else { showToast("Product Removed 🗑️"); fetchData(); }
        }

        fetchData();
    </script>
</body>
</html>
