<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUD | LIVE TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; color: #000; }
        .tracking-bar { position: relative; height: 4px; background: #eee; width: 100%; border-radius: 2px; }
        .tracking-progress { position: absolute; left: 0; top: 0; height: 100%; background: #000; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .step-dot { width: 12px; height: 12px; background: #eee; border-radius: 50%; z-index: 10; transition: all 0.3s; }
        .step-dot.active { background: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.1); }
        .status-card { border: 1px solid #eee; border-radius: 16px; padding: 24px; transition: all 0.3s; }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .pulse-effect { position: relative; }
        .pulse-effect::after { content: ''; position: absolute; inset: -10px; border: 2px solid #000; border-radius: 50%; animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-2xl font-black italic tracking-tighter">LOUD<span class="text-orange-500">.</span></h1>
            <div class="bg-black text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Live Pulse</div>
        </header>

        <div id="loading" class="py-20 text-center opacity-30 text-xs font-bold uppercase tracking-widest">Connecting to Warehouse...</div>

        <div id="tracker" class="hidden space-y-12">
            <div class="text-center space-y-4">
                <div class="w-20 h-20 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-8 pulse-effect">
                    <span id="statusIcon" class="material-symbols-outlined text-3xl">package_2</span>
                </div>
                <h2 id="statusText" class="text-4xl font-black uppercase tracking-tighter">PACKING</h2>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Order #ORD-<span id="orderId">...</span></p>
            </div>

            <div class="space-y-6">
                <div class="tracking-bar flex justify-between items-center">
                    <div id="progressBar" class="tracking-progress" style="width: 25%"></div>
                    <div class="step-dot active" title="Placed"></div>
                    <div id="dot-packing" class="step-dot" title="Packing"></div>
                    <div id="dot-shipped" class="step-dot" title="Shipped"></div>
                    <div id="dot-delivered" class="step-dot" title="Delivered"></div>
                </div>
                <div class="flex justify-between text-[10px] font-black text-gray-300 uppercase tracking-tighter">
                    <span>PLACED</span>
                    <span>PACKING</span>
                    <span>SHIPPED</span>
                    <span>DONE</span>
                </div>
            </div>

            <div class="status-card space-y-6">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Order Summary</h3>
                <div id="itemList" class="space-y-4"></div>
                <div class="pt-4 border-t border-gray-100 flex justify-between items-center">
                    <span class="font-black">TOTAL PAID</span>
                    <span class="font-black text-xl">₹<span id="orderTotal">0</span></span>
                </div>
            </div>

            <button onclick="contactSupport()" class="w-full py-5 bg-black text-white rounded-2xl font-black uppercase tracking-widest text-xs flex items-center justify-center gap-3 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-sm">chat</span> Contact Support
            </button>
        </div>

        <div id="error" class="hidden py-20 text-center space-y-6">
            <span class="material-symbols-outlined text-5xl text-gray-200">error</span>
            <p class="text-xs font-bold uppercase tracking-widest opacity-30">Order Not Found</p>
            <button onclick="window.location.href='index.html'" class="text-xs font-black underline">Back to Store</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://asvelariyhlcrnujtqsq.supabase.co";
        const SB_KEY = "sb_publishable_T6-Wlk2PumuS8_xzBRI3ng_KWouOIDi";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');

        async function init() {
            if (!orderId) { showView('error'); return; }
            
            const { data, error } = await _supabase.from('orders').select('*').eq('id', orderId).single();
            
            if (error || !data) { showView('error'); return; }
            
            render(data);
            showView('tracker');

            // SUBSCRIBE TO REAL-TIME UPDATES
            _supabase.channel('order-status')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders', filter: `id=eq.${orderId}` }, payload => {
                    render(payload.new);
                })
                .subscribe();
        }

        function render(order) {
            document.getElementById('orderId').innerText = order.id;
            document.getElementById('orderTotal').innerText = order.total_amount;
            document.getElementById('statusText').innerText = order.status;
            
            const steps = { 'Pending': 10, 'Packing': 40, 'Shipped': 75, 'Delivered': 100 };
            const icons = { 'Pending': 'receipt_long', 'Packing': 'package_2', 'Shipped': 'directions_bike', 'Delivered': 'verified' };
            
            document.getElementById('progressBar').style.width = (steps[order.status] || 0) + '%';
            document.getElementById('statusIcon').innerText = icons[order.status] || 'package_2';
            
            // Activate dots
            const statusOrder = ['Pending', 'Packing', 'Shipped', 'Delivered'];
            const currentIndex = statusOrder.indexOf(order.status);
            
            statusOrder.forEach((s, i) => {
                const dot = document.getElementById(`dot-${s.toLowerCase()}`);
                if (dot) {
                    if (i <= currentIndex) dot.classList.add('active');
                    else dot.classList.remove('active');
                }
            });

            document.getElementById('itemList').innerHTML = order.items.map(i => `
                <div class="flex justify-between text-xs font-bold">
                    <span class="text-gray-500">${i.qty}x ${i.name}</span>
                    <span>₹${i.price * i.qty}</span>
                </div>
            `).join('');
        }

        function showView(id) {
            ['loading', 'tracker', 'error'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function contactSupport() {
            window.open('https://wa.me/919441276604?text=' + encodeURIComponent("I have a question about Order #ORD-" + orderId), '_blank');
        }

        init();
    </script>
</body>
</html>
